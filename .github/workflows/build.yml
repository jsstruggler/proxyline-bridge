name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller proxyline-bridge.spec --clean

      - name: Rename executable for release
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/proxyline-bridge.exe dist/proxyline-bridge-windows.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mv dist/proxyline-bridge dist/proxyline-bridge-macos
          else
            mv dist/proxyline-bridge dist/proxyline-bridge-linux
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxyline-bridge-${{ matrix.os }}
          path: dist/proxyline-bridge-*
          if-no-files-found: ignore
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/proxyline-bridge-*
